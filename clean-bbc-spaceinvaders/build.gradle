plugins {
    id 'java'
    id 'maven-publish'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.8'
}

group 'ch.bbcag'
version '1.0-SNAPSHOT'
description = 'cucumbergradle'
//java.sourceCompatibility = JavaVersion.VERSION_1_8

repositories {
    mavenCentral()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation 'org.springframework:spring-beans:5.3.4'
    implementation group: 'org.springframework', name: 'spring-context', version: '5.3.4'
    compile 'javax.annotation:javax.annotation-api:1.3.2'
    testCompile('org.springframework.boot:spring-boot-starter-test:2.4.4')

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.7.1'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.7.1'

    //testImplementation('junit:junit:4.13')
    //testImplementation('org.testfx:testfx-junit:4.0.16-alpha')

    testImplementation "org.testfx:testfx-core:4.0.16-alpha"
    testImplementation "org.testfx:testfx-junit5:4.0.16-alpha"

    testCompile "org.mockito:mockito-core:3.+"
    testCompile('org.mockito:mockito-junit-jupiter:3.9.0')
    //testImplementation 'org.springframework.boot:spring-boot-starter-test'

    testImplementation group: 'org.assertj', name: 'assertj-core', version: '3.13.2'
    testImplementation group: 'org.springframework', name: 'spring-test', version: '5.3.4'

    testImplementation 'io.cucumber:cucumber-java:6.8.1'
    testImplementation 'io.cucumber:cucumber-junit:6.8.1'

    compile 'org.powermock:powermock-api-mockito2:2.0.9'
    compile 'org.powermock:powermock-module-junit4:2.0.7'
}

test {
    useJUnitPlatform()
}

sourceSets.test {
    resources.srcDirs = ["src/test/assets"]
}

mainClassName = 'spaceinvaders.App'

javafx {
    modules = [ 'javafx.controls', 'javafx.media', 'javafx.graphics']
}

jar {
    manifest{
        attributes 'Main-Class': 'spaceinvaders.main.App'
    }

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

configurations {
    cucumberRuntime {
        extendsFrom testImplementation
    }
}

task cucumber() {
    dependsOn assemble, testClasses
    doLast {
        javaexec {
            main = "io.cucumber.core.cli.Main"
            classpath = configurations.cucumberRuntime + sourceSets.main.output + sourceSets.test.output
            args = ['--plugin', 'pretty', '--glue', 'hellocucumber', 'src/test/resources']
        }
    }
}


